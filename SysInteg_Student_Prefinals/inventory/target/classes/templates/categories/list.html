<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><svg class="ui-icon icon-green"><use href="#icon-tag"></use></svg>Categories</h1>
            <div class="page-actions">
                <a th:href="@{/categories/new}" class="btn page-success-btn">
                    <svg class="ui-icon"><use href="#icon-plus"></use></svg>
                    <span>Add Category</span>
                </a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show page-alert" role="alert">
            <span th:text="${success}">Category saved.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/categories}" method="get" class="search-panel">
            <input type="text" name="search" class="form-control" placeholder="Search by name or description..." th:value="${search}"/>
            <button class="btn page-secondary-btn" type="submit">
                <svg class="ui-icon"><use href="#icon-search"></use></svg>
                <span>Search</span>
            </button>
            <a th:href="@{/categories}" class="btn page-secondary-btn">
                <svg class="ui-icon"><use href="#icon-x"></use></svg>
                <span>Clear</span>
            </a>
        </form>

        <div class="entity-grid" th:if="${categories != null && !categories.isEmpty()}">
            <article class="entity-card" th:each="c : ${categories}">
                <div class="entity-card-body">
                    <h2 class="entity-card-title" th:text="${c.name}">Category Name</h2>
                    <p class="entity-card-description" th:text="${c.description != null && !c.description.isBlank() ? c.description : 'No description yet.'}">Description</p>
                </div>
                <div class="entity-card-actions">
                    <a th:href="@{/categories/edit/{id}(id=${c.id})}" class="icon-action edit" aria-label="Edit category">
                        <svg class="ui-icon"><use href="#icon-pencil"></use></svg>
                    </a>
                    <form th:action="@{/categories/delete/{id}(id=${c.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this category?')">
                        <button class="icon-action delete" type="submit" aria-label="Delete category">
                            <svg class="ui-icon"><use href="#icon-trash"></use></svg>
                        </button>
                    </form>
                </div>
            </article>
        </div>

        <div class="empty-state-panel" th:if="${categories == null || categories.isEmpty()}">
            <svg class="ui-icon"><use href="#icon-inbox"></use></svg>
            <span th:text="${search != null && !search.isBlank() ? 'No categories found.' : 'No categories yet.'}">No categories yet.</span>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
