<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Product Detail')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page app-page-narrow" th:if="${product != null}">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product</li>
            </ol>
        </nav>

        <section class="detail-panel">
            <div class="detail-header">
                <div>
                    <span class="detail-kicker" th:text="${product.sku}">SKU</span>
                    <h1 class="detail-title" th:text="${product.name}">Product Name</h1>
                    <p class="detail-description" th:text="${product.description != null && !product.description.isBlank() ? product.description : 'No description yet.'}">Description</p>
                </div>
                <div class="text-md-end">
                    <div class="detail-price">
                        <span>&#8369;</span><span th:text="${#numbers.formatDecimal(product.price,1,2)}">0.00</span>
                    </div>
                    <span th:if="${product.stockQuantity == 0}" class="app-badge badge-danger">Out of Stock</span>
                    <span th:if="${product.stockQuantity > 0 and product.isLowStock()}" class="app-badge badge-warning">Low Stock</span>
                    <span th:if="${product.stockQuantity > 0 and !product.isLowStock()}" class="app-badge badge-success">In Stock</span>
                </div>
            </div>

            <dl class="detail-list">
                <dt>Category</dt>
                <dd th:text="${product.category?.name ?: '-'}">-</dd>
                <dt>Supplier</dt>
                <dd th:text="${product.supplier?.name ?: '-'}">-</dd>
                <dt>Stock Quantity</dt>
                <dd th:text="${product.stockQuantity}">0</dd>
                <dt>Reorder Level</dt>
                <dd th:text="${product.reorderLevel}">10</dd>
            </dl>

            <div class="form-actions">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn page-secondary-btn">
                    <svg class="ui-icon"><use href="#icon-pencil"></use></svg>
                    <span>Edit</span>
                </a>
                <a th:href="@{/transactions/new}" class="btn page-primary-btn">
                    <svg class="ui-icon"><use href="#icon-arrows"></use></svg>
                    <span>Stock Movement</span>
                </a>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
