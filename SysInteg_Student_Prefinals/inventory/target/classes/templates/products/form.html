<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Product Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page app-page-narrow">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">
                <svg class="ui-icon"><use href="#icon-cube"></use></svg>
                <span th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">Product Form</span>
            </h1>
        </div>

        <section class="form-panel">
            <form th:action="@{/products/save}" th:object="${product}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <label class="form-label">Product Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Wireless Mouse"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">SKU <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{sku}" class="form-control" placeholder="e.g. ELEC-001"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Price (&#8369;) <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{price}" class="form-control" step="0.01" min="0.01"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Stock Qty <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{stockQuantity}" class="form-control" min="0"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Reorder Level</label>
                        <input type="number" th:field="*{reorderLevel}" class="form-control" min="0"/>
                        <div class="form-text">Alert when stock is at or below this.</div>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <select th:field="*{categoryId}" class="form-select">
                            <option value="">Select Category</option>
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">Category</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Supplier</label>
                        <select th:field="*{supplierId}" class="form-select">
                            <option value="">Select Supplier</option>
                            <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.name}">Supplier</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn page-primary-btn">
                        <svg class="ui-icon"><use href="#icon-check"></use></svg>
                        <span>Save Product</span>
                    </button>
                    <a th:href="@{/products}" class="btn page-secondary-btn">
                        <svg class="ui-icon"><use href="#icon-x"></use></svg>
                        <span>Cancel</span>
                    </a>
                </div>
            </form>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
