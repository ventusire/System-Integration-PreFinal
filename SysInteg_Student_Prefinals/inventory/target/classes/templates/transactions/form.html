<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Stock Movement')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page app-page-compact">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><svg class="ui-icon"><use href="#icon-arrows"></use></svg>Record Stock Movement</h1>
        </div>

        <section class="form-panel">
            <div class="mb-3">
                <label class="form-label">Product <span class="text-danger">*</span></label>
                <select id="productSelect" class="form-select">
                    <option value="">Select Product</option>
                    <option th:each="p : ${products}" th:value="${p.id}"
                            th:text="${p.name} + ' (' + ${p.sku} + ') - Stock: ' + ${p.stockQuantity}">Product</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Quantity <span class="text-danger">*</span></label>
                <input type="number" id="qtyInput" class="form-control" min="1" value="1"/>
            </div>
            <div class="mb-4">
                <label class="form-label">Reason <span class="text-muted small">(optional)</span></label>
                <input type="text" id="reasonInput" class="form-control" placeholder="e.g. Purchase Order #001 / Sold to customer"/>
            </div>
            <div class="movement-actions">
                <form id="inForm" th:action="@{/transactions/stock-in}" method="post">
                    <input type="hidden" name="productId" id="inProductId"/>
                    <input type="hidden" name="quantity" id="inQty"/>
                    <input type="hidden" name="reason" id="inReason"/>
                    <button type="submit" class="btn page-success-btn w-100">
                        <svg class="ui-icon"><use href="#icon-arrow-up-circle"></use></svg>
                        <span>Stock In (Add Stock)</span>
                    </button>
                </form>
                <form id="outForm" th:action="@{/transactions/stock-out}" method="post">
                    <input type="hidden" name="productId" id="outProductId"/>
                    <input type="hidden" name="quantity" id="outQty"/>
                    <input type="hidden" name="reason" id="outReason"/>
                    <button type="submit" class="btn page-danger-btn w-100">
                        <svg class="ui-icon"><use href="#icon-arrow-down-circle"></use></svg>
                        <span>Stock Out (Remove Stock)</span>
                    </button>
                </form>
                <a th:href="@{/transactions}" class="btn page-secondary-btn">
                    <svg class="ui-icon"><use href="#icon-x"></use></svg>
                    <span>Cancel</span>
                </a>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
