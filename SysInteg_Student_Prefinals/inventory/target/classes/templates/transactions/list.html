<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Transactions')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container-fluid px-4 py-5" style="max-width: 1400px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="dashboard-title mb-0"><i class="bi bi-arrow-left-right me-2 text-primary"></i>Stock Transactions
            </h2>
            <a th:href="@{/transactions/new}" class="btn btn-primary rounded-pill px-4 fw-medium"><i
                    class="bi bi-plus-lg me-2"></i>New Transaction</a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3"
            th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm rounded-3"
            th:text="${error}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="card border-0 shadow-sm"
            style="border-radius: 12px; overflow: hidden; border: 1px solid #f1f5f9 !important;">
            <div class="table-responsive">
                <table class="table table-custom mb-0 w-100">
                    <thead>
                        <tr>
                            <th>Tx ID</th>
                            <th>Type</th>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Reason</th>
                            <th class="text-end pe-4">Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tx : ${transactions}">
                            <td class="text-muted small fw-medium" th:text="'#' + ${tx.id}">#1</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="product-icon-box rounded-circle shadow-sm"
                                        style="width: 32px; height: 32px;"
                                        th:classappend="${tx.type.name() == 'STOCK_IN' ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger'}">
                                        <i class="bi"
                                            th:classappend="${tx.type.name() == 'STOCK_IN' ? 'bi-arrow-down-left' : 'bi-arrow-up-right'}"></i>
                                    </div>
                                    <span class="fw-bold" style="font-size: 0.9rem;"
                                        th:classappend="${tx.type.name() == 'STOCK_IN' ? 'text-success' : 'text-danger'}"
                                        th:text="${tx.type.name() == 'STOCK_IN' ? 'INBOUND' : 'OUTBOUND'}">IN</span>
                                </div>
                            </td>
                            <td>
                                <div class="fw-bold text-dark d-block" th:text="${tx.product?.name}">Product</div>
                                <span class="text-muted small fw-medium"
                                    th:text="'SKU: ' + ${tx.product?.sku}">SKU</span>
                            </td>
                            <td class="fw-bold fs-5 text-dark"
                                th:text="${tx.type.name() == 'STOCK_IN' ? '+' : '-'} + ${tx.quantity}">0</td>
                            <td class="text-muted small fw-medium" th:text="${tx.reason != null ? tx.reason : '—'}">—
                            </td>
                            <td class="text-end pe-4 text-muted small fw-medium"
                                th:text="${#temporals.format(tx.transactionDate,'MMM d, yyyy HH:mm')}">Date</td>
                        </tr>
                        <tr th:if="${transactions.isEmpty()}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-clipboard-x fs-1 d-block mb-3 text-secondary"></i>
                                <p class="mb-0">No transactions recorded yet.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
