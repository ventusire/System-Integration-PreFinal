<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' - InventoryMS'">InventoryMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg app-navbar">
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
        <symbol id="icon-brand-cubes" viewBox="0 0 24 24">
            <path d="M12 2.8 7.1 5.6 12 8.4l4.9-2.8L12 2.8Z"/>
            <path d="m5.6 8.1-4.1 2.3 4.1 2.4 4.2-2.4-4.2-2.3Z"/>
            <path d="m18.4 8.1-4.2 2.3 4.2 2.4 4.1-2.4-4.1-2.3Z"/>
            <path d="M7.1 5.6v5.5L12 14l4.9-2.9V5.6"/>
            <path d="M1.5 10.4v5.2l4.1 2.5 4.2-2.5v-5.2"/>
            <path d="M14.2 10.4v5.2l4.2 2.5 4.1-2.5v-5.2"/>
            <path d="M12 8.4V14"/>
            <path d="M5.6 12.8v5.3"/>
            <path d="M18.4 12.8v5.3"/>
        </symbol>
        <symbol id="icon-cube" viewBox="0 0 24 24">
            <path d="M12 3.2 4.8 7.3 12 11.4l7.2-4.1L12 3.2Z"/>
            <path d="M4.8 7.3v8.3l7.2 4.2v-8.4L4.8 7.3Z"/>
            <path d="M19.2 7.3v8.3L12 19.8"/>
            <path d="M12 11.4v8.4"/>
        </symbol>
        <symbol id="icon-tag" viewBox="0 0 24 24">
            <path d="M4.5 5.2v6l8.1 8.1c.8.8 2 .8 2.8 0l4-4c.8-.8.8-2 0-2.8L11.3 4.4h-6c-.4 0-.8.4-.8.8Z"/>
            <circle cx="8.4" cy="8.4" r="1.35"/>
        </symbol>
        <symbol id="icon-truck" viewBox="0 0 24 24">
            <path d="M3.4 6.5h10.4v8.2H3.4V6.5Z"/>
            <path d="M13.8 9.1h3.7l3.1 3.3v2.3h-6.8V9.1Z"/>
            <path d="M5.4 17.3a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
            <path d="M17.6 17.3a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
            <path d="M7.4 15.3h8.2"/>
        </symbol>
        <symbol id="icon-arrows" viewBox="0 0 24 24">
            <path d="M16.8 4.4 21 8.6l-4.2 4.2"/>
            <path d="M21 8.6H7.2"/>
            <path d="M7.2 19.6 3 15.4l4.2-4.2"/>
            <path d="M3 15.4h13.8"/>
        </symbol>
        <symbol id="icon-database" viewBox="0 0 24 24">
            <ellipse cx="12" cy="5.7" rx="6.7" ry="2.8"/>
            <path d="M5.3 5.7v12.6c0 1.5 3 2.8 6.7 2.8s6.7-1.3 6.7-2.8V5.7"/>
            <path d="M5.3 11.9c0 1.5 3 2.8 6.7 2.8s6.7-1.3 6.7-2.8"/>
            <path d="M5.3 17.2c0 1.5 3 2.8 6.7 2.8s6.7-1.3 6.7-2.8"/>
        </symbol>
        <symbol id="icon-spring" viewBox="0 0 24 24">
            <path d="M12 2.6 20.1 7.3v9.4L12 21.4l-8.1-4.7V7.3L12 2.6Z" fill="currentColor" stroke="none"/>
            <path d="M8.1 14.6c4.8.4 7.4-2.3 7.8-7.2-4.6.3-7.5 2.8-7.8 7.2Z" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7.4 16.7c1.5-2.9 3.5-4.6 6.3-5.4" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        </symbol>
        <symbol id="icon-warning" viewBox="0 0 24 24">
            <path d="M12 3.9 21 19H3L12 3.9Z"/>
            <path d="M12 9v4.8"/>
            <path d="M12 16.9h.01"/>
        </symbol>
        <symbol id="icon-x-circle" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8.4"/>
            <path d="m9.2 9.2 5.6 5.6"/>
            <path d="m14.8 9.2-5.6 5.6"/>
        </symbol>
        <symbol id="icon-clock" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8.7"/>
            <path d="M12 6.8V12l3.4 2.1"/>
        </symbol>
        <symbol id="icon-search" viewBox="0 0 24 24">
            <circle cx="10.8" cy="10.8" r="6.4"/>
            <path d="m15.4 15.4 4.1 4.1"/>
        </symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24">
            <path d="M12 5.2v13.6"/>
            <path d="M5.2 12h13.6"/>
        </symbol>
        <symbol id="icon-pencil" viewBox="0 0 24 24">
            <path d="m4.2 16.9-.9 3.8 3.8-.9L18.6 8.3l-2.9-2.9L4.2 16.9Z"/>
            <path d="m14.5 6.6 2.9 2.9"/>
            <path d="M12.9 20.2h7.4"/>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24">
            <path d="M5.3 7.1h13.4"/>
            <path d="M9.2 7.1V4.8h5.6v2.3"/>
            <path d="m7.1 7.1.8 12.1c.1.9.8 1.6 1.7 1.6h4.8c.9 0 1.6-.7 1.7-1.6l.8-12.1"/>
            <path d="M10.4 10.8v6"/>
            <path d="M13.6 10.8v6"/>
        </symbol>
        <symbol id="icon-inbox" viewBox="0 0 24 24">
            <path d="M4.3 5.7h15.4l1.8 8.1v4.5c0 .9-.7 1.6-1.6 1.6H4.1c-.9 0-1.6-.7-1.6-1.6v-4.5l1.8-8.1Z"/>
            <path d="M2.5 13.8h5.1l1.6 2.4h5.6l1.6-2.4h5.1"/>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="m4.8 12.6 4.4 4.4 10-10"/>
        </symbol>
        <symbol id="icon-x" viewBox="0 0 24 24">
            <path d="m7.2 7.2 9.6 9.6"/>
            <path d="m16.8 7.2-9.6 9.6"/>
        </symbol>
        <symbol id="icon-arrow-up-circle" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8.7"/>
            <path d="M12 16.8V7.4"/>
            <path d="m8.5 10.9 3.5-3.5 3.5 3.5"/>
        </symbol>
        <symbol id="icon-arrow-down-circle" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8.7"/>
            <path d="M12 7.2v9.4"/>
            <path d="m15.5 13.1-3.5 3.5-3.5-3.5"/>
        </symbol>
    </svg>
    <div class="container-fluid px-4">
        <a class="navbar-brand app-brand" th:href="@{/}">
            <svg class="ui-icon brand-icon"><use href="#icon-brand-cubes"></use></svg>
            <span>InventoryMS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav app-nav-links me-auto ms-lg-3">
                <li class="nav-item">
                    <a class="nav-link" data-section="products" th:href="@{/products}">
                        <svg class="ui-icon"><use href="#icon-cube"></use></svg>
                        <span>Products</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="categories" th:href="@{/categories}">
                        <svg class="ui-icon"><use href="#icon-tag"></use></svg>
                        <span>Categories</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="suppliers" th:href="@{/suppliers}">
                        <svg class="ui-icon"><use href="#icon-truck"></use></svg>
                        <span>Suppliers</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="transactions" th:href="@{/transactions}">
                        <svg class="ui-icon"><use href="#icon-arrows"></use></svg>
                        <span>Transactions</span>
                    </a>
                </li>
            </ul>
            <div class="navbar-actions">
                <form class="nav-search" th:action="@{/products}" method="get" role="search">
                    <svg class="ui-icon"><use href="#icon-search"></use></svg>
                    <input type="search" name="search" placeholder="Search" aria-label="Search products"/>
                </form>
                <a class="btn stock-movement-btn" th:href="@{/transactions/new}">
                    <svg class="ui-icon"><use href="#icon-plus"></use></svg>
                    <span>Stock Movement</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="footer-bar text-center py-3 mt-5">
    <small class="text-muted">InventoryMS &mdash; Spring Boot + MySQL Student Project</small>
</footer>

</body>
</html>
