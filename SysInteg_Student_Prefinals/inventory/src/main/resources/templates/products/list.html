<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid px-4 py-5" style="max-width: 1400px; margin: 0 auto;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="dashboard-title mb-0"><i class="bi bi-box-seam me-2 text-primary"></i>Products</h2>
        <a th:href="@{/products/new}" class="btn btn-primary rounded-pill px-4 fw-medium"><i class="bi bi-plus-lg me-2"></i>Add Product</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    
    <div class="card border-0 shadow-sm mb-4 p-2" style="border-radius: 12px; background: #ffffff; border: 1px solid #f1f5f9 !important;">
        <div class="d-flex gap-2 m-0 p-2">
            <div class="input-group flex-grow-1">
                <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="liveSearch" class="form-control bg-light border-0" placeholder="Search by name or SKU..." autocomplete="off"/>
            </div>
            <button type="button" class="btn btn-dark px-4 rounded-3 fw-medium" onclick="document.getElementById('liveSearch').value=''; document.getElementById('liveSearch').dispatchEvent(new Event('input'));">Clear</button>
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden; border: 1px solid #f1f5f9 !important;">
        <div class="table-responsive">
            <table class="table table-custom mb-0 w-100">
                <thead>
                    <tr><th>Product Info</th><th>Category</th><th>Supplier</th><th>Price</th><th>Stock</th><th>Status</th><th class="text-end pe-4">Actions</th></tr>
                </thead>
                <tbody id="productTableBody">
                    <tr th:each="p : ${products}" class="product-row">
                        <td style="width: 30%;">
                            <div class="product-cell">
                                <div class="product-icon-box shadow-sm"><i class="bi bi-box"></i></div>
                                <div>
                                    <a th:href="@{/products/{id}(id=${p.id})}" class="fw-bold text-dark text-decoration-none d-block product-name" th:text="${p.name}">Name</a>
                                    <span class="text-muted small fw-medium product-sku" th:text="'SKU: ' + ${p.sku}">SKU</span>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge bg-light text-dark border" style="font-weight: 500;" th:text="${p.category?.name}">Cat</span></td>
                        <td class="text-muted small fw-medium" th:text="${p.supplier?.name}">Supplier</td>
                        <td class="fw-medium text-dark" th:text="'₱' + ${#numbers.formatDecimal(p.price,1,2)}">₱0</td>
                        <td>
                            <div class="fw-bold" th:classappend="${p.stockQuantity == 0 ? 'text-danger' : 'text-dark'}" th:text="${p.stockQuantity} + ' Units'">0</div>
                        </td>
                        <td>
                            <span th:if="${p.stockQuantity == 0}" class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 rounded-pill px-3">Out of Stock</span>
                            <span th:if="${p.stockQuantity > 0 and p.isLowStock()}" class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 rounded-pill px-3">Low Stock</span>
                            <span th:if="${p.stockQuantity > 0 and !p.isLowStock()}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-3">In Stock</span>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-light text-secondary me-1 rounded-2"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this product?')">
                                <button class="btn btn-sm btn-light text-danger rounded-2"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr id="noResultsRow" style="display:none;">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-search fs-1 d-block mb-3 text-secondary"></i>
                            <p class="mb-0">No matching products found.</p>
                        </td>
                    </tr>
                    <tr th:if="${products.isEmpty()}" id="emptyStateRow">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-3 text-secondary"></i>
                            <p class="mb-0">No products found.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0 py-3 d-flex justify-content-end" id="paginationContainer">
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.getElementById("liveSearch");
    const tableBody = document.getElementById("productTableBody");
    if (!tableBody) return;
    
    const rows = Array.from(tableBody.querySelectorAll("tr.product-row"));
    const noResultsRow = document.getElementById("noResultsRow");
    
    if (rows.length === 0) return;
    
    const itemsPerPage = 5;
    let currentPage = 1;
    let filteredRows = [...rows];
    
    function renderTable() {
        const totalPages = Math.ceil(filteredRows.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        
        rows.forEach(row => row.style.display = 'none');
        
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageRows = filteredRows.slice(start, end);
        
        pageRows.forEach(row => row.style.display = '');
        
        if (filteredRows.length === 0 && rows.length > 0) {
            if (noResultsRow) noResultsRow.style.display = '';
        } else {
            if (noResultsRow) noResultsRow.style.display = 'none';
        }
        
        renderPagination(totalPages);
    }
    
    function renderPagination(totalPages) {
        const paginationContainer = document.getElementById('paginationContainer');
        if (!paginationContainer) return;
        paginationContainer.innerHTML = '';
        
        if (totalPages <= 1) return;
        
        let html = '<ul class="pagination pagination-sm mb-0 shadow-sm">';
        html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link text-dark" href="#" data-page="${currentPage - 1}">Previous</a></li>`;
        
        for (let i = 1; i <= totalPages; i++) {
            html += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link ${currentPage === i ? 'bg-dark border-dark text-white' : 'text-dark'}" href="#" data-page="${i}">${i}</a></li>`;
        }
        
        html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link text-dark" href="#" data-page="${currentPage + 1}">Next</a></li>`;
        html += '</ul>';
        
        paginationContainer.innerHTML = html;
        
        paginationContainer.querySelectorAll('.page-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const parent = this.parentElement;
                if (parent.classList.contains('disabled') || parent.classList.contains('active')) return;
                
                const page = parseInt(this.getAttribute('data-page'));
                if (page >= 1 && page <= totalPages) {
                    currentPage = page;
                    renderTable();
                }
            });
        });
    }
    
    searchInput.addEventListener("input", function(e) {
        const term = e.target.value.toLowerCase();
        filteredRows = rows.filter(row => {
            const text = row.textContent.toLowerCase();
            return text.includes(term);
        });
        currentPage = 1;
        renderTable();
    });
    
    renderTable();
});
</script>
</body>
</html>
