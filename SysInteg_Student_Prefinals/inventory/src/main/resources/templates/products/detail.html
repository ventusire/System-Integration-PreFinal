<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head('Product Detail')}"></head>
  <body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div
      class="container py-5"
      style="max-width: 740px"
      th:if="${product != null}"
    >
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a th:href="@{/products}">Products</a>
          </li>
          <li class="breadcrumb-item active" th:text="${product.name}">
            Product
          </li>
        </ol>
      </nav>
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
          <div
            class="d-flex justify-content-between align-items-start flex-wrap gap-2"
          >
            <div>
              <code class="text-muted" th:text="${product.sku}">SKU</code>
              <h4 class="fw-bold mt-1" th:text="${product.name}">Name</h4>
              <p class="text-muted" th:text="${product.description}">Desc</p>
            </div>
            <div class="text-end">
              <div
                class="fs-3 fw-bold text-primary"
                th:text="'₱' + ${#numbers.formatDecimal(product.price,1,2)}"
              >
                ₱0
              </div>
              <span
                th:if="${product.stockQuantity == 0}"
                class="badge bg-danger fs-6"
                >Out of Stock</span
              >
              <span
                th:if="${product.stockQuantity > 0 and product.isLowStock()}"
                class="badge bg-warning text-dark fs-6"
                >Low Stock</span
              >
              <span
                th:if="${product.stockQuantity > 0 and !product.isLowStock()}"
                class="badge bg-success fs-6"
                >In Stock</span
              >
            </div>
          </div>
          <hr />
          <dl class="row mb-0">
            <dt class="col-sm-4">Category</dt>
            <dd class="col-sm-8" th:text="${product.category?.name}">—</dd>
            <dt class="col-sm-4">Supplier</dt>
            <dd class="col-sm-8" th:text="${product.supplier?.name}">—</dd>
            <dt class="col-sm-4">Stock Quantity</dt>
            <dd class="col-sm-8" th:text="${product.stockQuantity}">0</dd>
            <dt class="col-sm-4">Reorder Level</dt>
            <dd class="col-sm-8" th:text="${product.reorderLevel}">10</dd>
          </dl>
          <div class="d-flex gap-2 mt-4">
            <a
              th:href="@{/products/edit/{id}(id=${product.id})}"
              class="btn btn-outline-secondary"
              ><i class="bi bi-pencil me-1"></i>Edit</a
            >
            <a th:href="@{/transactions/new}" class="btn btn-primary"
              ><i class="bi bi-arrow-left-right me-1"></i>Stock Movement</a
            >
          </div>
        </div>
      </div>
    </div>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
