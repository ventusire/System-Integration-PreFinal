<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head('Product Form')}"></head>
  <body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container py-5" style="max-width: 640px">
      <h4
        class="fw-bold mb-4"
        th:text="${product.id == null ? 'Add New Product' : 'Edit Product'}"
      >
        Form
      </h4>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form
            th:action="@{/products/save}"
            th:object="${product}"
            method="post"
          >
            <input type="hidden" th:field="*{id}" />
            <div class="row g-3 mb-3">
              <div class="col-md-8">
                <label class="form-label"
                  >Product Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  th:field="*{name}"
                  class="form-control"
                  placeholder="e.g. Wireless Mouse"
                />
                <div
                  class="text-danger small"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                ></div>
              </div>
              <div class="col-md-4">
                <label class="form-label"
                  >SKU <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  th:field="*{sku}"
                  class="form-control"
                  placeholder="e.g. ELEC-001"
                />
                <div
                  class="text-danger small"
                  th:if="${#fields.hasErrors('sku')}"
                  th:errors="*{sku}"
                ></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea
                th:field="*{description}"
                class="form-control"
                rows="2"
              ></textarea>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label"
                  >Price (₱) <span class="text-danger">*</span></label
                >
                <input
                  type="number"
                  th:field="*{price}"
                  class="form-control"
                  step="0.01"
                  min="0.01"
                />
                <div
                  class="text-danger small"
                  th:if="${#fields.hasErrors('price')}"
                  th:errors="*{price}"
                ></div>
              </div>
              <div class="col-md-4">
                <label class="form-label"
                  >Stock Qty <span class="text-danger">*</span></label
                >
                <input
                  type="number"
                  th:field="*{stockQuantity}"
                  class="form-control"
                  min="0"
                />
                <div
                  class="text-danger small"
                  th:if="${#fields.hasErrors('stockQuantity')}"
                  th:errors="*{stockQuantity}"
                ></div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Reorder Level</label>
                <input
                  type="number"
                  th:field="*{reorderLevel}"
                  class="form-control"
                  min="0"
                />
                <div class="form-text">Alert when stock ≤ this</div>
              </div>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Category</label>
                <select th:field="*{categoryId}" class="form-select">
                  <option value="">-- Select Category --</option>
                  <option
                    th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                  >
                    Cat
                  </option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Supplier</label>
                <select th:field="*{supplierId}" class="form-select">
                  <option value="">-- Select Supplier --</option>
                  <option
                    th:each="s : ${suppliers}"
                    th:value="${s.id}"
                    th:text="${s.name}"
                  >
                    Sup
                  </option>
                </select>
              </div>
            </div>
            <div class="row g-2 mt-2">
              <div class="col-6">
                <a
                  th:href="@{/products}"
                  id="cancelBtn"
                  class="btn btn-danger w-100 fw-medium"
                  >Cancel</a
                >
              </div>
              <div class="col-6">
                <button
                  type="submit"
                  id="saveBtn"
                  class="btn btn-primary w-100 fw-medium"
                >
                  Save Product
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <!-- hidden span to pass skuError from server to JS -->
    <span id="skuErrorMsg" th:if="${skuError}" th:text="${skuError}" style="display:none;"></span>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const cancelBtn = document.getElementById("cancelBtn");
        const form = document.querySelector("form");

        // Show SweetAlert if a SKU duplicate error was returned from the server
        const skuErrorEl = document.getElementById("skuErrorMsg");
        if (skuErrorEl) {
          Swal.fire({
            title: "Duplicate SKU",
            text: skuErrorEl.textContent.trim(),
            icon: "error",
            confirmButtonColor: "#dc3545",
            confirmButtonText: "OK",
          });
        }

        cancelBtn.addEventListener("click", function (e) {
          e.preventDefault();
          const href = this.getAttribute("href");
          Swal.fire({
            title: "Are you sure?",
            text: "Any unsaved changes will be lost!",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#dc3545",
            cancelButtonColor: "#6c757d",
            confirmButtonText: "Yes, cancel!",
          }).then((result) => {
            if (result.isConfirmed) {
              window.location.href = href;
            }
          });
        });

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          Swal.fire({
            title: "Save Product?",
            text: "Are you sure you want to save this product?",
            icon: "question",
            showCancelButton: true,
            confirmButtonColor: "#0d6efd",
            cancelButtonColor: "#6c757d",
            confirmButtonText: "Yes, save it!",
          }).then((result) => {
            if (result.isConfirmed) {
              form.submit();
            }
          });
        });
      });
    </script>
  </body>
</html>
