<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Transactions')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><svg class="ui-icon"><use href="#icon-arrows"></use></svg>Stock Transactions</h1>
            <div class="page-actions">
                <a th:href="@{/transactions/new}" class="btn page-primary-btn">
                    <svg class="ui-icon"><use href="#icon-plus"></use></svg>
                    <span>New Movement</span>
                </a>
            </div>
        </div>

        <div th:if="${success != null || message != null}" class="alert alert-success alert-dismissible fade show page-alert" role="alert">
            <span th:text="${success != null ? success : message}">Transaction saved.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show page-alert" role="alert">
            <span th:text="${error}">Unable to record stock movement.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/transactions}" method="get" class="search-panel">
            <input type="text" name="search" class="form-control" placeholder="Search by product, SKU, type, or reason..." th:value="${search}"/>
            <button class="btn page-secondary-btn" type="submit">
                <svg class="ui-icon"><use href="#icon-search"></use></svg>
                <span>Search</span>
            </button>
            <a th:href="@{/transactions}" class="btn page-secondary-btn">
                <svg class="ui-icon"><use href="#icon-x"></use></svg>
                <span>Clear</span>
            </a>
        </form>

        <section class="content-panel">
            <div class="table-responsive">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Product</th>
                            <th>SKU</th>
                            <th>Type</th>
                            <th>Qty</th>
                            <th>Reason</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tx : ${transactions}">
                            <td class="muted-cell" th:text="${tx.id}">1</td>
                            <td class="row-title" th:text="${tx.product?.name}">Product</td>
                            <td><span class="sku-code" th:text="${tx.product?.sku}">SKU</span></td>
                            <td>
                                <span th:class="${tx.type.name() == 'STOCK_IN' ? 'app-badge badge-success' : 'app-badge badge-danger'}"
                                      th:text="${tx.type.name() == 'STOCK_IN' ? 'Stock In' : 'Stock Out'}">Stock In</span>
                            </td>
                            <td class="row-title" th:text="${tx.quantity}">0</td>
                            <td class="muted-cell" th:text="${tx.reason != null && !tx.reason.isBlank() ? tx.reason : '-'}">-</td>
                            <td><span class="muted-cell" th:text="${#temporals.format(tx.transactionDate,'MMM d, yyyy HH:mm')}">Date</span></td>
                        </tr>
                        <tr th:if="${transactions == null || transactions.isEmpty()}">
                            <td colspan="7" class="empty-table-cell">
                                <svg class="ui-icon me-2"><use href="#icon-clock"></use></svg>
                                <span th:text="${search != null && !search.isBlank() ? 'No transactions found.' : 'No transactions recorded yet.'}">No transactions recorded yet.</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
