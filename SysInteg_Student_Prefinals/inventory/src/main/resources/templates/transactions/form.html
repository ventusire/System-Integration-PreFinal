<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Stock Movement')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container py-5" style="max-width:600px">
        <h4 class="fw-bold mb-4">Record Stock Transactions</h4>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">



                <div class="mb-3">
                    <label class="form-label">Product <span class="text-danger">*</span></label>
                    <select id="productSelect" class="form-select" required>
                        <option value="">-- Select Product --</option>
                        <option th:each="p : ${products}" th:value="${p.id}"
                            th:text="${p.name} + ' (' + ${p.sku} + ') — Stock: ' + ${p.stockQuantity}">Product</option>
                    </select>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Quantity <span class="text-danger">*</span></label>
                        <input type="number" id="qtyInput" class="form-control" min="1" value="1" required />
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Reason <span class="text-muted small">(optional)</span></label>
                        <input type="text" id="reasonInput" class="form-control"
                            placeholder="e.g. Purchase Order / Sale" />
                    </div>
                </div>

                <div class="row g-2 mt-4">
                    <div class="col-6">
                        <button type="button" id="btnOut" class="btn btn-danger w-100 fw-medium py-2">
                            <i class="bi bi-arrow-down-circle me-1"></i>Stock OUT
                        </button>
                    </div>
                    <div class="col-6">
                        <button type="button" id="btnIn" class="btn btn-success w-100 fw-medium py-2">
                            <i class="bi bi-arrow-up-circle me-1"></i>Stock IN
                        </button>
                    </div>
                </div>

                <div class="mt-3 text-center">
                    <a th:href="@{/transactions}" id="cancelBtn"
                        class="text-secondary text-decoration-none fw-medium">Cancel Transaction</a>
                </div>

                <!-- Hidden forms for actual submission -->
                <form id="inForm" th:action="@{/transactions/stock-in}" method="post" style="display:none;">
                    <input type="hidden" name="productId" id="inProductId" />
                    <input type="hidden" name="quantity" id="inQty" />
                    <input type="hidden" name="reason" id="inReason" />
                </form>
                <form id="outForm" th:action="@{/transactions/stock-out}" method="post" style="display:none;">
                    <input type="hidden" name="productId" id="outProductId" />
                    <input type="hidden" name="quantity" id="outQty" />
                    <input type="hidden" name="reason" id="outReason" />
                </form>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const cancelBtn = document.getElementById('cancelBtn');
            const btnIn = document.getElementById('btnIn');
            const btnOut = document.getElementById('btnOut');

            cancelBtn.addEventListener('click', function (e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                Swal.fire({
                    title: 'Are you sure?',
                    text: "Any unsaved changes will be lost!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#dc3545',
                    cancelButtonColor: '#6c757d',
                    confirmButtonText: 'Yes, cancel!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = href;
                    }
                });
            });

            function handleTransaction(type) {
                const pid = document.getElementById('productSelect').value;
                const qty = document.getElementById('qtyInput').value;
                const rsn = document.getElementById('reasonInput').value;

                if (!pid) {
                    Swal.fire('Error', 'Please select a product first.', 'error');
                    return;
                }
                if (!qty || qty < 1) {
                    Swal.fire('Error', 'Quantity must be at least 1.', 'error');
                    return;
                }

                const typeText = type === 'in' ? 'Stock IN (Add)' : 'Stock OUT (Remove)';
                const confirmColor = type === 'in' ? '#198754' : '#dc3545';

                Swal.fire({
                    title: `Confirm ${typeText}`,
                    text: `Are you sure you want to record a ${typeText} for this product?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: confirmColor,
                    cancelButtonColor: '#6c757d',
                    confirmButtonText: 'Yes, confirm!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        document.getElementById(type + 'ProductId').value = pid;
                        document.getElementById(type + 'Qty').value = qty;
                        document.getElementById(type + 'Reason').value = rsn;
                        document.getElementById(type + 'Form').submit();
                    }
                });
            }

            btnIn.addEventListener('click', (e) => { e.preventDefault(); handleTransaction('in'); });
            btnOut.addEventListener('click', (e) => { e.preventDefault(); handleTransaction('out'); });
        });
    </script>
</body>

</html>
