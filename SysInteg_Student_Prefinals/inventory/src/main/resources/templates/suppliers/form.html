<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Supplier Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5" style="max-width:540px">
    <h4 class="fw-bold mb-4" th:text="${supplier.id == null ? 'Add Supplier' : 'Edit Supplier'}">Form</h4>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="supplierForm" th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Supplier Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control" required minlength="2" maxlength="100"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" th:field="*{email}" class="form-control" required maxlength="150"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{phone}" class="form-control" placeholder="02-XXXX-XXXX" required maxlength="20"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Address <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{address}" class="form-control" required maxlength="255"/>
                </div>
                <div class="d-flex gap-2">
                    <a id="cancelBtn" th:href="@{/suppliers}" class="btn btn-danger w-100">Cancel</a>
                    <button type="submit" id="saveBtn" class="btn btn-primary w-100">Save Supplier</button>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- Passes server-side errors to JS -->
<span id="emailErrorMsg" th:if="${emailError}" th:text="${emailError}" style="display:none;"></span>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('supplierForm');
        const cancelBtn = document.getElementById('cancelBtn');

        // Show SweetAlert if a duplicate email error was returned from the server
        const emailErrorEl = document.getElementById('emailErrorMsg');
        if (emailErrorEl) {
            Swal.fire({
                title: 'Duplicate Email',
                text: emailErrorEl.textContent.trim(),
                icon: 'error',
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'OK'
            });
        }

        cancelBtn.addEventListener('click', function (e) {
            e.preventDefault();
            const href = this.getAttribute('href');
            Swal.fire({
                title: 'Are you sure?',
                text: 'Any unsaved changes will be lost!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, cancel!'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = href;
                }
            });
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            const isEdit = document.querySelector('input[name="id"]').value !== '';
            Swal.fire({
                title: isEdit ? 'Update Supplier?' : 'Add Supplier?',
                text: 'Are you sure you want to save this supplier?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0d6efd',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, save it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        });
    });
</script>
</body>
</html>
