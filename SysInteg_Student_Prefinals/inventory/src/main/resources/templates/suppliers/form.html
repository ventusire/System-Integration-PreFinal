<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Supplier Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page app-page-compact">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">
                <svg class="ui-icon icon-purple"><use href="#icon-truck"></use></svg>
                <span th:text="${supplier.id == null ? 'Add Supplier' : 'Edit Supplier'}">Supplier Form</span>
            </h1>
        </div>

        <section class="form-panel">
            <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Supplier Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control"/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control"/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control" placeholder="02-XXXX-XXXX"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" th:field="*{address}" class="form-control"/>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn page-primary-btn">
                        <svg class="ui-icon"><use href="#icon-check"></use></svg>
                        <span>Save Supplier</span>
                    </button>
                    <a th:href="@{/suppliers}" class="btn page-secondary-btn">
                        <svg class="ui-icon"><use href="#icon-x"></use></svg>
                        <span>Cancel</span>
                    </a>
                </div>
            </form>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
