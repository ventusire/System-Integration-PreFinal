<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Supplier Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5" style="max-width:540px">
    <h4 class="fw-bold mb-4" th:text="${supplier.id == null ? 'Add Supplier' : 'Edit Supplier'}">Form</h4>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Supplier Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control" placeholder="02-XXXX-XXXX"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Address</label>
                    <input type="text" th:field="*{address}" class="form-control"/>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/suppliers}" class="btn btn-danger w-100">Cancel</a>
                    <button type="submit" class="btn btn-primary w-100">Save Supplier</button>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
