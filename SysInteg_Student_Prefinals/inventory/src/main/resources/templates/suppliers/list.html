<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Suppliers')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Hidden span carries flash message from server to JS -->
<span id="successMsg" th:if="${success}" th:text="${success}" style="display:none;"></span>

<div class="container-fluid px-4 py-5" style="max-width: 1400px; margin: 0 auto;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="dashboard-title mb-0"><i class="bi bi-truck me-2 text-primary" style="color: var(--purple) !important;"></i>Suppliers</h2>
        <a th:href="@{/suppliers/new}" class="btn btn-primary rounded-pill px-4 fw-medium"><i class="bi bi-plus-lg me-2"></i>Add Supplier</a>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden; border: 1px solid #f1f5f9 !important;">
        <div class="table-responsive">
            <table class="table table-custom mb-0 w-100">
                <thead>
                    <tr><th>Supplier Details</th><th>Contact Info</th><th>Address</th><th class="text-end pe-4">Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${suppliers}">
                        <td>
                            <div class="product-cell">
                                <div class="product-icon-box shadow-sm" style="background: #eff6ff; color: #3b82f6;"><i class="bi bi-building"></i></div>
                                <div class="fw-bold text-dark" th:text="${s.name}">Name</div>
                            </div>
                        </td>
                        <td>
                            <div class="text-dark small fw-medium mb-1"><i class="bi bi-envelope text-muted me-2"></i><span th:text="${s.email}">email</span></div>
                            <div class="text-dark small fw-medium"><i class="bi bi-telephone text-muted me-2"></i><span th:text="${s.phone}">phone</span></div>
                        </td>
                        <td class="text-muted small fw-medium" th:text="${s.address}">address</td>
                        <td class="text-end pe-4">
                            <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" class="btn btn-sm btn-light text-secondary me-1 rounded-2"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/suppliers/delete/{id}(id=${s.id})}" method="post" class="d-inline" onsubmit="confirmDelete(event, this)">
                                <button type="submit" class="btn btn-sm btn-light text-danger rounded-2"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${suppliers.isEmpty()}">
                        <td colspan="4" class="text-center text-muted py-5">
                            <i class="bi bi-building-x fs-1 d-block mb-3 text-secondary"></i>
                            <p class="mb-0">No suppliers yet.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/main.js}"></script>
<script>
    // Fire success SweetAlert on redirect after add / edit / delete
    document.addEventListener('DOMContentLoaded', function () {
        const msgEl = document.getElementById('successMsg');
        if (msgEl) {
            Swal.fire({
                title: 'Success!',
                text: msgEl.textContent.trim(),
                icon: 'success',
                timer: 2500,
                timerProgressBar: true,
                showConfirmButton: false,
                toast: true,
                position: 'top-end'
            });
        }
    });

    function confirmDelete(event, form) {
        event.preventDefault();
        Swal.fire({
            title: 'Delete Supplier?',
            text: "This action cannot be undone!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!'
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit();
            }
        });
    }
</script>
</body>
</html>
