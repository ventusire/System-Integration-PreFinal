<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Suppliers')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="app-page">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title"><svg class="ui-icon icon-purple"><use href="#icon-truck"></use></svg>Suppliers</h1>
            <div class="page-actions">
                <a th:href="@{/suppliers/new}" class="btn page-primary-btn">
                    <svg class="ui-icon"><use href="#icon-plus"></use></svg>
                    <span>Add Supplier</span>
                </a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show page-alert" role="alert">
            <span th:text="${success}">Supplier saved successfully.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <section class="content-panel">
            <div class="table-responsive">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${suppliers}">
                            <td class="row-title" th:text="${s.name}">Name</td>
                            <td th:text="${s.email}">email</td>
                            <td th:text="${s.phone}">phone</td>
                            <td class="muted-cell" th:text="${s.address}">address</td>
                            <td>
                                <div class="action-cell">
                                    <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" class="icon-action edit" aria-label="Edit supplier">
                                        <svg class="ui-icon"><use href="#icon-pencil"></use></svg>
                                    </a>
                                    <form th:action="@{/suppliers/delete/{id}(id=${s.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this supplier?')">
                                        <button class="icon-action delete" type="submit" aria-label="Delete supplier">
                                            <svg class="ui-icon"><use href="#icon-trash"></use></svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${suppliers == null || suppliers.isEmpty()}">
                            <td colspan="5" class="empty-table-cell">
                                <svg class="ui-icon me-2"><use href="#icon-inbox"></use></svg>No suppliers yet.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
