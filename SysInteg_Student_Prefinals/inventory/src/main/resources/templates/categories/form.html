<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Category Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5" style="max-width:500px">
    <h4 class="fw-bold mb-4" th:text="${category.id == null ? 'Add Category' : 'Edit Category'}">Form</h4>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="categoryForm" th:action="@{/categories/save}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control" required minlength="2" maxlength="100"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <input type="text" th:field="*{description}" class="form-control" maxlength="255"/>
                </div>
                <div class="row g-2 mt-2">
                    <div class="col-6">
                        <a th:href="@{/categories}" id="cancelBtn" class="btn btn-danger w-100 fw-medium">Cancel</a>
                    </div>
                    <div class="col-6">
                        <button type="submit" id="saveBtn" class="btn btn-primary w-100 fw-medium">Save Category</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- Passes server-side errors to JS -->
<span id="nameErrorMsg" th:if="${nameError}" th:text="${nameError}" style="display:none;"></span>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const cancelBtn = document.getElementById('cancelBtn');
    const form = document.getElementById('categoryForm');

    // Show SweetAlert if a duplicate name error was returned from the server
    const nameErrorEl = document.getElementById('nameErrorMsg');
    if (nameErrorEl) {
        Swal.fire({
            title: 'Duplicate Category Name',
            text: nameErrorEl.textContent.trim(),
            icon: 'error',
            confirmButtonColor: '#dc3545',
            confirmButtonText: 'OK'
        });
    }

    cancelBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.getAttribute('href');
        Swal.fire({
            title: 'Are you sure?',
            text: "Any unsaved changes will be lost!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, cancel!'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = href;
            }
        });
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }
        const isEdit = form.querySelector('input[name="id"]').value !== '';
        Swal.fire({
            title: isEdit ? 'Update Category?' : 'Save Category?',
            text: "Are you sure you want to save this category?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#0d6efd',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, save it!'
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit();
            }
        });
    });
});
</script>
</body>
</html>
