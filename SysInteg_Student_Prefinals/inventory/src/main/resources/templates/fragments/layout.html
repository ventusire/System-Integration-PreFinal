<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — InventoryMS'">InventoryMS</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light navbar-pill">
    <div class="container-fluid px-4 py-1">
        <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
            <img th:src="@{/favicon.png}" alt="Logo" width="24" height="24" class="me-2">
            InventoryMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="navMenu">
            <ul class="navbar-nav mb-2 mb-lg-0 gap-3 fw-medium text-secondary">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">Categories</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/suppliers}">Suppliers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transactions}">Transactions</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="footer-bar py-4 mt-auto" style="background: transparent; border-top: none;">
    <div class="container d-flex justify-content-center align-items-center text-muted small px-4" style="max-width: 1400px;">
        <span class="mb-0">&copy; <span th:text="${T(java.time.Year).now()}">2026</span> Inventory Management System</span>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            document.querySelectorAll('.navbar-pill .nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href !== '/' && path.startsWith(href)) {
                    link.classList.add('active');
                } else if (href === '/' && path === '/') {
                    link.classList.add('active');
                }
            });
        });
    </script>
</footer>

</body>
</html>
