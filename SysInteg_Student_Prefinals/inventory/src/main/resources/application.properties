spring.application.name=inventory
server.port=8080

# =============================================
#  MySQL Database Configuration
#  Step 1: Run database-setup.sql in MySQL
#  Step 2: Update username and password below
#  Step 3: Run the app — tables are auto-created
#          by DataSeeder.java on first startup
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/inventorydb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No Hibernate — using plain Spring JDBC (JdbcTemplate)
# Tables are created manually via database-setup.sql

# Thymeleaf
spring.thymeleaf.cache=false

# Logging — prints every SQL query to the console
logging.level.com.inventory=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
